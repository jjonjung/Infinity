; Android-specific engine overrides.
; This file is loaded on top of DefaultEngine.ini when packaging for Android.

[/Script/Engine.RendererSettings]
; Ray Tracing is not supported on Android - must be disabled
r.RayTracing=0
r.RayTracing.RayTracingProxies.ProjectEnabled=0
; Lumen GI is not supported on Android (use None=0 or SSGI=2)
r.DynamicGlobalIlluminationMethod=0
; Lumen Reflections are not supported on Android (use Screen Space=1 or None=0)
r.ReflectionMethod=0
; Virtual Shadow Maps are not supported on Android (use Shadow Maps=0)
r.Shadow.Virtual.Enable=0
; Skin Cache shaders are expensive - disable on mobile
r.SkinCache.CompileShaders=False
; Mobile-friendly auto exposure
r.DefaultFeature.AutoExposure=True

[/Script/HardwareTargeting.HardwareTargetingSettings]
TargetedHardwareClass=Mobile
DefaultGraphicsPerformance=Scalable

[/Script/AndroidRuntimeSettings.AndroidRuntimeSettings]
bSupportsVulkan=True
bSupportsOpenGLES32=False
NDKAPILevelOverride=android-26
